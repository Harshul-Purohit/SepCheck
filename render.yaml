services:
  - type: web
    name: sepcheck-backend
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Using a stable version instead of 3.14
      - key: GROQ_API_KEY
        sync: false # Set this in Render Dashboard
